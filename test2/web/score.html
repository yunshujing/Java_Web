<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生成绩录入系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px;
            width: 100%;
            max-width: 520px;
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #667eea;
        }

        .hobby-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 6px;
        }

        .hobby-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
            font-size: 14px;
            cursor: pointer;
            padding: 6px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .hobby-group label:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .hobby-group input[type="checkbox"] {
            accent-color: #667eea;
        }

        .score-row {
            display: flex;
            gap: 12px;
        }

        .score-row .form-group {
            flex: 1;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s, transform 0.15s;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .hint {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>学生成绩录入</h1>
        <form action="ScoreServlet" method="post">

            <!-- 学号 -->
            <div class="form-group">
                <label for="studentId">学号</label>
                <input type="text" id="studentId" name="studentId"
                       placeholder="请输入学号，如：2024001" required>
            </div>

            <!-- 姓名 -->
            <div class="form-group">
                <label for="studentName">姓名</label>
                <input type="text" id="studentName" name="studentName"
                       placeholder="请输入姓名" required>
            </div>

            <!-- 兴趣爱好（多选） -->
            <div class="form-group">
                <label>兴趣爱好</label>
                <div class="hobby-group">
                    <label><input type="checkbox" name="hobbies" value="阅读"> 阅读</label>
                    <label><input type="checkbox" name="hobbies" value="运动"> 运动</label>
                    <label><input type="checkbox" name="hobbies" value="音乐"> 音乐</label>
                    <label><input type="checkbox" name="hobbies" value="编程"> 编程</label>
                    <label><input type="checkbox" name="hobbies" value="绘画"> 绘画</label>
                    <label><input type="checkbox" name="hobbies" value="旅行"> 旅行</label>
                </div>
            </div>

            <!-- 三门成绩 -->
            <div class="score-row">
                <div class="form-group">
                    <label for="javaScore">Java成绩</label>
                    <input type="number" id="javaScore" name="javaScore"
                           placeholder="0-100" min="0" max="100" required>
                </div>
                <div class="form-group">
                    <label for="webFrontScore">Web前端成绩</label>
                    <input type="number" id="webFrontScore" name="webFrontScore"
                           placeholder="0-100" min="0" max="100" required>
                </div>
                <div class="form-group">
                    <label for="webServerScore">Web服务端成绩</label>
                    <input type="number" id="webServerScore" name="webServerScore"
                           placeholder="0-100" min="0" max="100" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">提 交 成 绩</button>
            <p class="hint">成绩范围 0~100 分，提交后将自动计算总分、平均分和等级</p>
        </form>
    </div>
</body>
</html>
